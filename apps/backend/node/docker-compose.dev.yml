# Local Development Docker Compose for CalCalCal
# Usage: docker-compose -f docker-compose.dev.yml up -d
#
# This sets up:
# - PostgreSQL database (local)
# - Node.js API server (from your local code, with hot-reload)
#
# The API will be available at: http://localhost:3000

version: '3.8'

services:
  # PostgreSQL Database for local development
  postgres:
    image: postgres:15-alpine
    container_name: calcalcal-dev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calcalcal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calcalcal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - calcalcal-dev-network

  # Node.js API (Development mode with volume mount for hot reload)
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: calcalcal-dev-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/calcalcal_dev
      # Load other env vars from .env.local file
    env_file:
      - .env.local
    volumes:
      # Mount source code for hot-reload (when using ts-node-dev or nodemon)
      - ./src:/app/src:ro
      # Note: node_modules is NOT mounted, uses container's installed deps
    restart: unless-stopped
    networks:
      - calcalcal-dev-network
    # Override CMD to run in dev mode with hot reload
    command: npm run dev

  # Optional: pgAdmin for database management
  # Uncomment if you want a web-based DB admin tool
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: calcalcal-dev-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@calcalcal.app
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - calcalcal-dev-network

networks:
  calcalcal-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local

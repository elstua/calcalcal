# Nginx configuration for CalCalCal API
# Place this file in /etc/nginx/sites-available/calcalcal.conf
# Then create symlink: sudo ln -s /etc/nginx/sites-available/calcalcal.conf /etc/nginx/sites-enabled/

# Rate limiting zone (prevent abuse)
# 200 req/min per IP; burst=80 so a single "update paragraph" burst (list + PATCHes + analyze + streaks + polling) doesn't hit 503
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/m;

# Upstream backend (Docker container)
upstream calcalcal_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.calcalcal.app media.calcalcal.app;

    # Let's Encrypt challenge location (for certbot -d api.calcalcal.app -d media.calcalcal.app)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.calcalcal.app;

    # SSL Configuration (Let's Encrypt will manage these)
    ssl_certificate /etc/letsencrypt/live/api.calcalcal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.calcalcal.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/calcalcal_access.log;
    error_log /var/log/nginx/calcalcal_error.log;

    # Max upload size (for image uploads)
    client_max_body_size 20M;
    client_body_buffer_size 20M;

    # AI endpoints: longer read timeout (LLM can take 60–90s)
    location /api/ai/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://calcalcal_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Storage upload: longer timeouts so mobile uploads are less likely to be cut off
    location /api/storage/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://calcalcal_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
        client_body_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Proxy to API container
    location / {
        # Rate limiting (200/min per IP; burst=80 for update-paragraph flows that send many requests at once)
        limit_req zone=api_limit burst=80 nodelay;

        proxy_pass http://calcalcal_api;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts (increased for AI analysis requests)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://calcalcal_api;
        proxy_http_version 1.1;
        access_log off;  # Don't log health checks
    }
}

# Media subdomain: serve uploads (proxies to same API container; no volume needed)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.calcalcal.app;

    ssl_certificate /etc/letsencrypt/live/media.calcalcal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.calcalcal.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/calcalcal_media_access.log;
    error_log /var/log/nginx/calcalcal_media_error.log;

    # Serve uploads by proxying to API container (Express serves /uploads)
    location /uploads/ {
        proxy_pass http://calcalcal_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
